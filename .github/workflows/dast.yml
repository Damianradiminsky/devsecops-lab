# .github/workflows/dast.yml
name: DAST — OWASP ZAP

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  security-events: write
  contents: read
  issues: write

jobs:
  dast:
    name: OWASP ZAP Dynamic Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build imagen
        run: docker build -t devsecops-lab:dast .

      - name: Levantar app en background
        run: |
          docker run -d \
            --name target-app \
            -p 8080:8080 \
            devsecops-lab:dast
          
          echo "Esperando que la app esté lista..."
          timeout 60 sh -c \
            'until curl -sf http://localhost:8080/health; do
              echo "  Esperando..."
              sleep 3
            done'
          echo "App lista en http://localhost:8080"

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8080"
          rules_file_name: ".zap/rules.tsv"
          fail_action: warn
          cmd_options: "-I"
        continue-on-error: true

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: "http://localhost:8080"
          rules_file_name: ".zap/rules.tsv"
          fail_action: warn
          cmd_options: "-m 10"
        continue-on-error: true

      - name: Upload reporte ZAP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report-${{ github.run_id }}
          path: report_html.html
          retention-days: 30

      - name: Cleanup
        if: always()
        run: docker stop target-app && docker rm target-app || true